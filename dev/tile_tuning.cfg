[colors]
; Tile body colors (#RRGGBB or #RRGGBBAA)
tile_face=#f4efe3
tile_back=#e5dfcf

[numbers]
; Glyph/number base colors per suit
red=#c91515
blue=#1f6fb6
black=#111111
yellow=#b89b00

[readability]
; Presets: balanced | texture_first | high_contrast
preset="balanced"

; Tile face readability controls (0.2..1.0, 0.0..1.0)
tile_face_roughness=0.74
tile_face_specular=0.08

; Number/glyph material controls
; value_mul: 0.3..2.0, saturation_mul: 0.0..2.0
number_value_mul=0.92
number_saturation_mul=1.18
; roughness/specular: 0.0..1.0
number_roughness=0.34
number_specular=0.02
; true = max readability (unlit numerals)
number_unshaded=false
; 0.8..1.6 (only affects mesh-based numerals)
number_mesh_scale=1.18
; true = preserve Text/Torus materials from tiles_library.glb (recommended when colors are embedded in Blender)
use_embedded_number_materials=true
; NOTE: with use_embedded_number_materials=true, [numbers] colors are ignored for library tiles.
; true = show bare GLB tile materials (no runtime tile effects/tinting/panel overlays)
raw_library_tiles=true
; safe clamp for raw mode: preserves embedded colors/textures while removing metallic/spec glow behavior
safe_raw_material_clamp=false
raw_body_roughness_min=0.74
raw_body_specular_max=0.10
raw_numeric_roughness_min=0.84
raw_numeric_specular_max=0.05

; Authoritative raw surface rebuild (recommended to kill GLB conversion artifacts)
tile_authoritative_surface=false
tile_authoritative_keep_albedo_texture=false
tile_authoritative_body_roughness=0.74
tile_authoritative_body_specular=0.05
tile_authoritative_numeric_roughness=0.68
tile_authoritative_numeric_specular=0.03
tile_authoritative_body_value_mul=0.94

; Classy tile finish filter (works for both raw and non-raw tile paths)
tile_finish_filter_enabled=false
tile_finish_filter_strength=0.00
tile_finish_warm_tint=#f3ebdc
tile_finish_roughness_boost=0.18
tile_finish_specular_scale=0.28
tile_finish_numeric_saturation_mul=0.96
tile_finish_numeric_value_mul=0.95
tile_finish_strip_aux_maps=false

; Optional readability panel on tile face
panel_enabled=false
panel_color=#ffffff
panel_alpha_standing=0.00
panel_alpha_flat=0.00

; Optional forced text overlay helper
force_number_labels=false
label_text_alpha=0.96
label_outline_alpha=0.78
label_font_size_standing=12
label_pixel_size_standing=0.00024
label_outline_size_standing=1
label_font_size_flat=26
label_pixel_size_flat=0.00100
label_outline_size_flat=2

; Helper notes:
; - Auto reload is ON while game is running (checks every 0.5s).
; - F9: force reload now.
; - F10: dump effective values.
; - F11: print tuning help/ranges.
